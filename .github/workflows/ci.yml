name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Redirect + SEO config test
        run: npm run test:redirects

      - name: Build
        # Builds get to access the same env vars production has access to.
        # We don't fail the build if env vars are missing locally — Next.js
        # falls back to inline defaults from src/lib/supabase.ts where applicable.
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Stub vars so generateStaticParams() can hit Supabase during build
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
