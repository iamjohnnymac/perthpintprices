name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 22
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Redirect + SEO config test
        run: npm run test:redirects

      - name: Build
        # Builds get to access the same env vars production has access to.
        # We don't fail the build if env vars are missing locally — Next.js
        # falls back to inline defaults from src/lib/supabase.ts where applicable.
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Stub vars so generateStaticParams() can hit Supabase during build
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Pub fingerprint guard
        # Quantifies scaled-content exposure: asserts prerendered pub pages span
        # many distinct content shells rather than collapsing to 1-2 thin
        # templates. Skips automatically if the build prerendered too few pages
        # (e.g. missing DB secrets). See scripts/check-pub-fingerprints.mjs (#80).
        run: npm run check:fingerprints

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playwright PR proof
        run: npm run test:e2e
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload Playwright proof
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-proof
          path: |
            playwright-report
            test-results/playwright
          retention-days: 14
