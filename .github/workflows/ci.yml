name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: GSC baseline refresh contract test
        run: npm run test:gsc-baseline

      - name: Redirect + SEO config test
        run: npm run test:redirects

      - name: Security header config test
        run: npm run test:headers

      - name: Agent access contract test
        run: npm run test:access

      - name: Build
        # prebuild checks Supabase reachability/data volume; postbuild checks
        # that the generated pub pages have healthy content diversity.
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Stub vars so generateStaticParams() can hit Supabase during build
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playwright PR proof
        run: npm run test:e2e
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload Playwright proof
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-proof
          path: |
            playwright-report
            test-results/playwright
          retention-days: 14
